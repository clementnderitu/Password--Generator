<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,1,0&icon_names=content_paste"
    />
    <link rel="stylesheet" href="index.css" />
    <title>Document</title>
  </head>
  <body>
    <div class="card">
      <h1>Get a <span>random password</span></h1>
      <p class="subtext">never use an insecure password</p>
      <button class="generate-btn" id="generate-pass">Generate password</button>
      <div class="divider"></div>
      <div class="password-container">
        <div class="password">
          <span id="pass1"></span>
          <button class="clipboard" id="copy1">
            <span class="material-symbols-outlined"> content_paste </span>
          </button>
        </div>
        <div class="password">
          <span id="pass2"></span>
          <button class="clipboard" id="copy2">
            <span class="material-symbols-outlined"> content_paste </span>
          </button>
        </div>
      </div>
    </div>
    <script src="index.js"></script>
  </body>
</html>
